<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Lounge Booking | 3D Барабаны</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
      color: #e0e0e0;
      padding: 20px 16px 32px;
      min-height: 100vh;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      animation: fadeInUp 0.5s ease-out;
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: #888;
      font-size: 14px;
      margin-bottom: 32px;
      border-left: 3px solid #2ecc71;
      padding-left: 12px;
    }

    .section {
      margin-bottom: 28px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 14px;
      color: #2ecc71;
    }

    .section-title span {
      font-size: 24px;
    }

    /* 3D Барабан */
    .picker-3d {
      position: relative;
      background: rgba(30, 30, 30, 0.9);
      border-radius: 20px;
      padding: 10px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(46, 204, 113, 0.3);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .picker-3d-container {
      display: flex;
      gap: 15px;
      justify-content: center;
      background: #1a1a1a;
      border-radius: 16px;
      padding: 15px;
    }

    .picker-column {
      flex: 1;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .picker-label {
      font-size: 12px;
      color: #2ecc71;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .picker-track {
      height: 150px;
      overflow-y: auto;
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      border-radius: 12px;
      background: #0f0f0f;
      box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.5);
    }

    .picker-track::-webkit-scrollbar {
      width: 2px;
    }

    .picker-track::-webkit-scrollbar-track {
      background: #2a2a2a;
      border-radius: 10px;
    }

    .picker-track::-webkit-scrollbar-thumb {
      background: #2ecc71;
      border-radius: 10px;
    }

    .picker-item {
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 500;
      scroll-snap-align: center;
      transition: all 0.2s ease;
      color: #666;
    }

    .picker-item.active {
      color: #2ecc71;
      font-size: 24px;
      font-weight: 700;
      text-shadow: 0 0 10px rgba(46, 204, 113, 0.5);
      transform: scale(1.1);
    }

    .picker-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      background: linear-gradient(to bottom, 
        rgba(26, 26, 26, 0.9) 0%, 
        transparent 20%, 
        transparent 80%, 
        rgba(26, 26, 26, 0.9) 100%);
    }

    .strength-badge {
      margin-top: 10px;
      text-align: center;
      font-size: 14px;
      color: #2ecc71;
    }

    /* Двойной селект для вкусов */
    .flavor-select {
      width: 100%;
      padding: 14px 16px;
      background: #1e1e1e;
      border: 1px solid #2c2c2c;
      border-radius: 14px;
      color: #e0e0e0;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .flavor-select:hover {
      border-color: #2ecc71;
    }

    /* Карточки напитков */
    .drinks-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .drink-card {
      background: #1e1e1e;
      border: 1px solid #2c2c2c;
      border-radius: 16px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .drink-card:hover {
      border-color: #2ecc71;
      transform: translateX(4px);
    }

    .drink-card.selected {
      border-color: #2ecc71;
      background: rgba(46, 204, 113, 0.08);
    }

    .drink-emoji {
      font-size: 48px;
      background: #2a2a2a;
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
    }

    .drink-info {
      flex: 1;
    }

    .drink-name {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .drink-price {
      color: #2ecc71;
      font-size: 15px;
      font-weight: 600;
    }

    .drink-checkbox {
      width: 24px;
      height: 24px;
      border: 2px solid #444;
      border-radius: 8px;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .drink-card.selected .drink-checkbox {
      background: #2ecc71;
      border-color: #2ecc71;
    }

    .drink-checkbox::after {
      content: "✓";
      color: #1a1a1a;
      font-size: 16px;
      font-weight: bold;
      display: none;
    }

    .drink-card.selected .drink-checkbox::after {
      display: block;
    }

    input[type="checkbox"] {
      display: none;
    }

    .booking-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
      border: none;
      border-radius: 16px;
      color: white;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 24px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
    }

    .booking-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(46, 204, 113, 0.4);
    }

    .total-price {
      background: linear-gradient(135deg, #1e1e1e 0%, #161616 100%);
      border-radius: 16px;
      padding: 16px;
      margin-top: 20px;
      text-align: center;
      border: 1px solid #2c2c2c;
    }

    .total-amount {
      font-size: 28px;
      font-weight: 700;
      color: #2ecc71;
    }

    @media (max-width: 480px) {
      .drink-emoji {
        font-size: 36px;
        width: 52px;
        height: 52px;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>Lounge Booking</h1>
  <div class="subtitle">Забронируй идеальный вечер 🎵</div>

  <!-- Время - 3D барабаны -->
  <div class="section">
    <div class="section-title">
      <span>⏰</span>
      <span>Время</span>
    </div>
    <div class="picker-3d">
      <div class="picker-3d-container">
        <div class="picker-column">
          <div class="picker-label">Час</div>
          <div class="picker-track" id="hourTrack">
            <div class="picker-item" data-value="18">18</div>
            <div class="picker-item" data-value="19">19</div>
            <div class="picker-item" data-value="20">20</div>
            <div class="picker-item" data-value="21">21</div>
            <div class="picker-item" data-value="22">22</div>
            <div class="picker-item" data-value="23">23</div>
          </div>
        </div>
        <div class="picker-column">
          <div class="picker-label">Минуты</div>
          <div class="picker-track" id="minuteTrack">
            <div class="picker-item" data-value="00">00</div>
            <div class="picker-item" data-value="15">15</div>
            <div class="picker-item" data-value="30">30</div>
            <div class="picker-item" data-value="45">45</div>
          </div>
        </div>
      </div>
      <div class="picker-overlay"></div>
    </div>
  </div>

  <!-- Зона -->
  <div class="section">
    <div class="section-title">
      <span>📍</span>
      <span>Зона</span>
    </div>
    <select id="zone" class="flavor-select">
      <option value="Основная зона">Основная зона 🪑</option>
      <option value="VIP комната">VIP комната 👑</option>
      <option value="Балкон">Балкон 🌙</option>
      <option value="Терраса">Терраса 🌿</option>
    </select>
  </div>

  <!-- Кальян - расширенные вкусы + 3D барабан крепости -->
  <div class="section">
    <div class="section-title">
      <span>💨</span>
      <span>Кальян</span>
    </div>
    <select id="flavor" class="flavor-select" style="margin-bottom: 12px;">
      <option value="Мята">Мята 🌿</option>
      <option value="Яблоко">Яблоко 🍎</option>
      <option value="Арбуз">Арбуз 🍉</option>
      <option value="Виноград">Виноград 🍇</option>
      <option value="Клубника">Клубника 🍓</option>
      <option value="Персик">Персик 🍑</option>
      <option value="Двойное яблоко">Двойное яблоко 🍎🍎</option>
      <option value="Манго">Манго 🥭</option>
      <option value="Кола">Кола 🥤</option>
      <option value="Лимон">Лимон 🍋</option>
      <option value="Вишня">Вишня 🍒</option>
      <option value="Малина">Малина 🍓</option>
      <option value="Ананас">Ананас 🍍</option>
      <option value="Кокос">Кокос 🥥</option>
      <option value="Грейпфрут">Грейпфрут 🍊</option>
    </select>
    
    <div class="picker-3d">
      <div class="picker-3d-container">
        <div class="picker-column">
          <div class="picker-label">Крепость (1-10)</div>
          <div class="picker-track" id="strengthTrack">
            <div class="picker-item" data-value="1">1</div>
            <div class="picker-item" data-value="2">2</div>
            <div class="picker-item" data-value="3">3</div>
            <div class="picker-item" data-value="4">4</div>
            <div class="picker-item" data-value="5">5</div>
            <div class="picker-item" data-value="6">6</div>
            <div class="picker-item" data-value="7">7</div>
            <div class="picker-item" data-value="8">8</div>
            <div class="picker-item" data-value="9">9</div>
            <div class="picker-item" data-value="10">10</div>
          </div>
        </div>
      </div>
      <div class="picker-overlay"></div>
    </div>
    <div class="strength-badge" id="strengthLabel">Крепость: 5</div>
  </div>

  <!-- Напитки -->
  <div class="section">
    <div class="section-title">
      <span>🍹</span>
      <span>Напитки</span>
    </div>
    <div class="drinks-grid" id="drinksGrid">
      <div class="drink-card" data-name="Лимонад" data-price="300">
        <div class="drink-emoji">🍋</div>
        <div class="drink-info">
          <div class="drink-name">Лимонад</div>
          <div class="drink-price">300 ₽</div>
        </div>
        <div class="drink-checkbox"></div>
        <input type="checkbox" value="Лимонад" class="drink-input">
      </div>
      <div class="drink-card" data-name="Чай" data-price="200">
        <div class="drink-emoji">🍵</div>
        <div class="drink-info">
          <div class="drink-name">Чай</div>
          <div class="drink-price">200 ₽</div>
        </div>
        <div class="drink-checkbox"></div>
        <input type="checkbox" value="Чай" class="drink-input">
      </div>
      <div class="drink-card" data-name="Мохито" data-price="350">
        <div class="drink-emoji">🍹</div>
        <div class="drink-info">
          <div class="drink-name">Мохито безалкогольный</div>
          <div class="drink-price">350 ₽</div>
        </div>
        <div class="drink-checkbox"></div>
        <input type="checkbox" value="Мохито" class="drink-input">
      </div>
      <div class="drink-card" data-name="Кофе" data-price="180">
        <div class="drink-emoji">☕</div>
        <div class="drink-info">
          <div class="drink-name">Кофе эспрессо</div>
          <div class="drink-price">180 ₽</div>
        </div>
        <div class="drink-checkbox"></div>
        <input type="checkbox" value="Кофе" class="drink-input">
      </div>
    </div>
  </div>

  <div class="total-price">
    <div class="total-amount" id="totalAmount">0 ₽</div>
  </div>

  <button class="booking-btn" onclick="submitOrder()">✨ Забронировать ✨</button>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  tg.ready();
  
  tg.MainButton.setText("📋 Оформить заказ");
  tg.MainButton.show();
  tg.MainButton.onClick(() => submitOrder());

  // Инициализация 3D барабанов
  function initPicker(trackId, callback) {
    const track = document.getElementById(trackId);
    if (!track) return;
    
    const items = track.querySelectorAll('.picker-item');
    const updateActive = () => {
      const scrollTop = track.scrollTop;
      const itemHeight = 50;
      const activeIndex = Math.round(scrollTop / itemHeight);
      items.forEach((item, idx) => {
        if (idx === activeIndex) {
          item.classList.add('active');
        } else {
          item.classList.remove('active');
        }
      });
      const activeValue = items[activeIndex]?.dataset.value;
      if (activeValue && callback) callback(activeValue);
    };
    
    track.addEventListener('scroll', updateActive);
    track.addEventListener('touchmove', updateActive);
    setTimeout(updateActive, 100);
    
    // Центрирование при загрузке
    setTimeout(() => {
      const activeItem = track.querySelector('.picker-item.active');
      if (activeItem) {
        track.scrollTop = Array.from(items).indexOf(activeItem) * 50;
      }
    }, 100);
  }
  
  // Переменные для хранения выбранных значений
  let selectedHour = "18";
  let selectedMinute = "00";
  let selectedStrength = "5";
  
  initPicker('hourTrack', (value) => { selectedHour = value; });
  initPicker('minuteTrack', (value) => { selectedMinute = value; });
  initPicker('strengthTrack', (value) => { 
    selectedStrength = value;
    document.getElementById('strengthLabel').textContent = `Крепость: ${value}`;
  });
  
  // Напитки и сумма
  const drinkCards = document.querySelectorAll('.drink-card');
  const totalAmountSpan = document.getElementById('totalAmount');
  
  function updateTotal() {
    let total = 0;
    drinkCards.forEach(card => {
      if (card.classList.contains('selected')) {
        total += parseInt(card.dataset.price);
      }
    });
    totalAmountSpan.textContent = total + ' ₽';
    return total;
  }
  
  drinkCards.forEach(card => {
    card.addEventListener('click', (e) => {
      e.stopPropagation();
      card.classList.toggle('selected');
      const checkbox = card.querySelector('.drink-input');
      checkbox.checked = card.classList.contains('selected');
      updateTotal();
      if (tg.HapticFeedback) {
        tg.HapticFeedback.impactOccurred('light');
      }
    });
  });
  
  updateTotal();
  
  function submitOrder() {
    const selectedDrinks = [];
    drinkCards.forEach(card => {
      if (card.classList.contains('selected')) {
        selectedDrinks.push({
          name: card.dataset.name,
          price: parseInt(card.dataset.price)
        });
      }
    });
    
    const bookingData = {
      time: `${selectedHour}:${selectedMinute}`,
      zone: document.getElementById("zone").value,
      hookah: {
        flavor: document.getElementById("flavor").value,
        strength: parseInt(selectedStrength)
      },
      drinks: selectedDrinks,
      totalPrice: updateTotal(),
      timestamp: new Date().toISOString()
    };
    
    tg.sendData(JSON.stringify(bookingData));
    
    if (tg.showPopup) {
      tg.showPopup({
        title: '✅ Готово!',
        message: `Вы забронировали на ${bookingData.time}\nВкус: ${bookingData.hookah.flavor}\nКрепость: ${bookingData.hookah.strength}/10\nСумма: ${bookingData.totalPrice} ₽`,
        buttons: [{type: 'ok'}]
      });
    }
  }
</script>
</body>
</html>
