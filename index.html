<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Lounge Booking</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
            color: #e0e0e0;
            padding: 20px 16px 32px;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 32px;
            border-left: 3px solid #2ecc71;
            padding-left: 12px;
        }

        .section {
            margin-bottom: 28px;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 14px;
            color: #2ecc71;
        }

        .section-title span {
            font-size: 24px;
        }

        /* Чикоичный 3D барабан */
        .picker-3d {
            position: relative;
            background: rgba(30, 30, 30, 0.9);
            border-radius: 24px;
            padding: 8px;
            border: 1px solid rgba(46, 204, 113, 0.3);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .picker-3d-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            background: #0f0f0f;
            border-radius: 18px;
            padding: 15px;
        }

        .picker-column {
            flex: 1;
            text-align: center;
            position: relative;
        }

        .picker-label {
            font-size: 12px;
            color: #2ecc71;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .picker-track {
            height: 150px;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            border-radius: 12px;
            background: #0a0a0a;
            border: 1px solid #2c2c2c;
            scrollbar-width: thin;
        }

        .picker-track::-webkit-scrollbar {
            width: 3px;
        }

        .picker-track::-webkit-scrollbar-track {
            background: #1e1e1e;
            border-radius: 10px;
        }

        .picker-track::-webkit-scrollbar-thumb {
            background: #2ecc71;
            border-radius: 10px;
        }

        /* Элементы барабана - высота ровно 50px */
        .picker-item {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 500;
            scroll-snap-align: start;
            transition: all 0.15s ease;
            color: #666;
        }

        .picker-item.active {
            color: #2ecc71;
            font-size: 28px;
            font-weight: 800;
            text-shadow: 0 0 8px rgba(46, 204, 113, 0.5);
        }

        /* Оверлей для затемнения сверху и снизу */
        .picker-overlay {
            position: absolute;
            top: 70px;
            left: 0;
            right: 0;
            bottom: 70px;
            pointer-events: none;
            background: linear-gradient(to bottom,
                rgba(15, 15, 15, 0.92) 0%,
                transparent 18%,
                transparent 82%,
                rgba(15, 15, 15, 0.92) 100%);
            border-radius: 12px;
        }

        /* Селекты */
        .flavor-select {
            width: 100%;
            padding: 14px 16px;
            background: #1e1e1e;
            border: 1px solid #2c2c2c;
            border-radius: 14px;
            color: #e0e0e0;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .flavor-select:focus {
            outline: none;
            border-color: #2ecc71;
        }

        /* Напитки */
        .drinks-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .drink-card {
            background: #1e1e1e;
            border: 1px solid #2c2c2c;
            border-radius: 16px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s ease;
        }

        .drink-card.selected {
            border-color: #2ecc71;
            background: rgba(46, 204, 113, 0.08);
        }

        .drink-emoji {
            font-size: 48px;
            background: #2a2a2a;
            width: 64px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
        }

        .drink-info {
            flex: 1;
        }

        .drink-name {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .drink-price {
            color: #2ecc71;
            font-size: 14px;
            font-weight: 600;
        }

        .drink-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #2a2a2a;
            border-radius: 40px;
            padding: 4px 8px;
        }

        .drink-qty-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #3a3a3a;
            border: none;
            color: #2ecc71;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .drink-qty-btn:active {
            transform: scale(0.95);
            background: #2ecc71;
            color: #1a1a1a;
        }

        .drink-qty {
            font-size: 18px;
            font-weight: 600;
            color: white;
            min-width: 30px;
            text-align: center;
        }

        /* Итого */
        .total-price {
            background: linear-gradient(135deg, #1e1e1e 0%, #161616 100%);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin-top: 20px;
            border: 1px solid #2c2c2c;
        }

        .total-label {
            font-size: 14px;
            color: #888;
            margin-bottom: 8px;
        }

        .total-amount {
            font-size: 36px;
            font-weight: 800;
            color: #2ecc71;
        }

        .total-breakdown {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
        }

        .booking-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 24px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }

        .booking-btn:active {
            transform: scale(0.98);
        }

        .booking-btn:disabled {
            opacity: 0.6;
            transform: none;
        }

        .error-message {
            background: rgba(231, 76, 60, 0.15);
            border: 1px solid #e74c3c;
            border-radius: 12px;
            padding: 12px;
            margin-top: 20px;
            color: #e74c3c;
            font-size: 14px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Lounge Booking</h1>
    <div class="subtitle">Забронируй идеальный вечер 🎵</div>

    <!-- Время -->
    <div class="section">
        <div class="section-title"><span>⏰</span><span>Время</span></div>
        <div class="picker-3d">
            <div class="picker-3d-container">
                <div class="picker-column">
                    <div class="picker-label">Час</div>
                    <div class="picker-track" id="hourTrack">
                        <div class="picker-item" data-value="18">18</div>
                        <div class="picker-item" data-value="19">19</div>
                        <div class="picker-item" data-value="20">20</div>
                        <div class="picker-item" data-value="21">21</div>
                        <div class="picker-item" data-value="22">22</div>
                        <div class="picker-item" data-value="23">23</div>
                    </div>
                </div>
                <div class="picker-column">
                    <div class="picker-label">Минуты</div>
                    <div class="picker-track" id="minuteTrack">
                        <div class="picker-item" data-value="00">00</div>
                        <div class="picker-item" data-value="15">15</div>
                        <div class="picker-item" data-value="30">30</div>
                        <div class="picker-item" data-value="45">45</div>
                    </div>
                </div>
            </div>
            <div class="picker-overlay"></div>
        </div>
    </div>

    <!-- Зона -->
    <div class="section">
        <div class="section-title"><span>📍</span><span>Зона</span></div>
        <select id="zone" class="flavor-select">
            <option value="Основная зона">Основная зона 🪑</option>
            <option value="VIP комната">VIP комната 👑</option>
            <option value="Балкон">Балкон 🌙</option>
            <option value="Терраса">Терраса 🌿</option>
        </select>
    </div>

    <!-- Кальян -->
    <div class="section">
        <div class="section-title"><span>💨</span><span>Кальян</span></div>
        <select id="flavor" class="flavor-select" style="margin-bottom: 12px;">
            <option value="Мята">Мята 🌿</option>
            <option value="Яблоко">Яблоко 🍎</option>
            <option value="Арбуз">Арбуз 🍉</option>
            <option value="Виноград">Виноград 🍇</option>
            <option value="Клубника">Клубника 🍓</option>
            <option value="Персик">Персик 🍑</option>
            <option value="Манго">Манго 🥭</option>
            <option value="Двойное яблоко">Двойное яблоко 🍎🍎</option>
            <option value="Кола">Кола 🥤</option>
        </select>
        <div class="picker-3d">
            <div class="picker-3d-container">
                <div class="picker-column">
                    <div class="picker-label">Крепость (1-10)</div>
                    <div class="picker-track" id="strengthTrack">
                        <div class="picker-item" data-value="1">1</div>
                        <div class="picker-item" data-value="2">2</div>
                        <div class="picker-item" data-value="3">3</div>
                        <div class="picker-item" data-value="4">4</div>
                        <div class="picker-item" data-value="5">5</div>
                        <div class="picker-item" data-value="6">6</div>
                        <div class="picker-item" data-value="7">7</div>
                        <div class="picker-item" data-value="8">8</div>
                        <div class="picker-item" data-value="9">9</div>
                        <div class="picker-item" data-value="10">10</div>
                    </div>
                </div>
            </div>
            <div class="picker-overlay"></div>
        </div>
    </div>

    <!-- Напитки -->
    <div class="section">
        <div class="section-title"><span>🍹</span><span>Напитки</span></div>
        <div class="drinks-grid" id="drinksGrid">
            <div class="drink-card" data-name="Лимонад" data-price="300" data-id="lemonade">
                <div class="drink-emoji">🍋</div>
                <div class="drink-info">
                    <div class="drink-name">Лимонад</div>
                    <div class="drink-price">300 ₽/шт</div>
                </div>
                <div class="drink-controls">
                    <button class="drink-qty-btn" data-action="minus">−</button>
                    <span class="drink-qty" id="qty-lemonade">0</span>
                    <button class="drink-qty-btn" data-action="plus">+</button>
                </div>
            </div>
            <div class="drink-card" data-name="Чай" data-price="200" data-id="tea">
                <div class="drink-emoji">🍵</div>
                <div class="drink-info">
                    <div class="drink-name">Чай</div>
                    <div class="drink-price">200 ₽/шт</div>
                </div>
                <div class="drink-controls">
                    <button class="drink-qty-btn" data-action="minus">−</button>
                    <span class="drink-qty" id="qty-tea">0</span>
                    <button class="drink-qty-btn" data-action="plus">+</button>
                </div>
            </div>
            <div class="drink-card" data-name="Мохито" data-price="350" data-id="mojito">
                <div class="drink-emoji">🍹</div>
                <div class="drink-info">
                    <div class="drink-name">Мохито</div>
                    <div class="drink-price">350 ₽/шт</div>
                </div>
                <div class="drink-controls">
                    <button class="drink-qty-btn" data-action="minus">−</button>
                    <span class="drink-qty" id="qty-mojito">0</span>
                    <button class="drink-qty-btn" data-action="plus">+</button>
                </div>
            </div>
            <div class="drink-card" data-name="Кофе" data-price="180" data-id="coffee">
                <div class="drink-emoji">☕</div>
                <div class="drink-info">
                    <div class="drink-name">Кофе</div>
                    <div class="drink-price">180 ₽/шт</div>
                </div>
                <div class="drink-controls">
                    <button class="drink-qty-btn" data-action="minus">−</button>
                    <span class="drink-qty" id="qty-coffee">0</span>
                    <button class="drink-qty-btn" data-action="plus">+</button>
                </div>
            </div>
        </div>
    </div>

    <div class="total-price">
        <div class="total-label">💰 ИТОГО К ОПЛАТЕ</div>
        <div class="total-amount" id="totalAmount">1300 ₽</div>
        <div class="total-breakdown" id="totalBreakdown">(включая кальян 1300₽)</div>
    </div>

    <button class="booking-btn" onclick="submitOrder()">✨ Забронировать ✨</button>
    <div id="errorMessage" class="error-message"></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    const BOT_API_URL = "https://kalik-github-io-1.onrender.com/booking";
    const HOOKAH_PRICE = 1300;

    // --- Чикоичные барабаны с фиксацией по центру ---
    let selectedHour = "18", selectedMinute = "00", selectedStrength = "5";
    
    function initPicker(trackId, callback, defaultValue) {
        const track = document.getElementById(trackId);
        if (!track) return;
        const items = track.querySelectorAll('.picker-item');
        const itemHeight = 50;
        
        // Функция определения активного элемента (который в зоне прицела)
        function updateActive() {
            const scrollTop = track.scrollTop;
            // Расчёт: активный тот, чей верх максимально близок к середине
            const targetScroll = scrollTop + (track.clientHeight / 2) - (itemHeight / 2);
            const activeIndex = Math.round(targetScroll / itemHeight);
            const validIndex = Math.min(Math.max(activeIndex, 0), items.length - 1);
            
            items.forEach((item, idx) => {
                if (idx === validIndex) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
            
            if (callback && items[validIndex]) {
                callback(items[validIndex].dataset.value);
            }
            return validIndex;
        }
        
        // Функция центрирования (доводки) после скролла
        function snapToNearest() {
            const scrollTop = track.scrollTop;
            const targetScroll = scrollTop + (track.clientHeight / 2) - (itemHeight / 2);
            const activeIndex = Math.round(targetScroll / itemHeight);
            const validIndex = Math.min(Math.max(activeIndex, 0), items.length - 1);
            // Плавная доводка до нужной позиции
            track.scrollTo({
                top: validIndex * itemHeight - (track.clientHeight / 2) + (itemHeight / 2),
                behavior: 'smooth'
            });
            updateActive();
        }
        
        // Находим элемент с defaultValue
        let targetIndex = 0;
        if (defaultValue) {
            items.forEach((item, idx) => {
                if (item.dataset.value === defaultValue.toString()) {
                    targetIndex = idx;
                }
            });
        }
        
        // Устанавливаем начальную позицию
        track.scrollTop = targetIndex * itemHeight - (track.clientHeight / 2) + (itemHeight / 2);
        
        // Обработчики событий
        let scrollTimeout;
        track.addEventListener('scroll', () => {
            clearTimeout(scrollTimeout);
            updateActive();
            scrollTimeout = setTimeout(snapToNearest, 100);
        });
        
        // Доводка после касания (touchend)
        track.addEventListener('touchend', () => {
            setTimeout(snapToNearest, 50);
        });
        
        setTimeout(() => {
            updateActive();
            snapToNearest();
        }, 30);
    }
    
    initPicker('hourTrack', (val) => { if(val) selectedHour = val; }, "18");
    initPicker('minuteTrack', (val) => { if(val) selectedMinute = val; }, "00");
    initPicker('strengthTrack', (val) => { if(val) selectedStrength = val; }, "5");

    // --- Количества напитков ---
    const drinks = {
        lemonade: { name: "Лимонад", price: 300, qty: 0 },
        tea: { name: "Чай", price: 200, qty: 0 },
        mojito: { name: "Мохито", price: 350, qty: 0 },
        coffee: { name: "Кофе", price: 180, qty: 0 }
    };
    
    function updateDrinkUI(drinkId) {
        const qtySpan = document.getElementById(`qty-${drinkId}`);
        if (qtySpan) {
            qtySpan.textContent = drinks[drinkId].qty;
        }
        const card = document.querySelector(`.drink-card[data-id="${drinkId}"]`);
        if (card) {
            if (drinks[drinkId].qty > 0) {
                card.classList.add('selected');
            } else {
                card.classList.remove('selected');
            }
        }
        updateTotal();
    }
    
    function changeQuantity(drinkId, delta) {
        const newQty = drinks[drinkId].qty + delta;
        if (newQty >= 0 && newQty <= 99) {
            drinks[drinkId].qty = newQty;
            updateDrinkUI(drinkId);
            
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        }
    }
    
    function getDrinksTotal() {
        let total = 0;
        for (const drink of Object.values(drinks)) {
            total += drink.price * drink.qty;
        }
        return total;
    }
    
    function updateTotal() {
        const drinksTotal = getDrinksTotal();
        const grandTotal = HOOKAH_PRICE + drinksTotal;
        const totalSpan = document.getElementById('totalAmount');
        const breakdownSpan = document.getElementById('totalBreakdown');
        
        if (totalSpan) {
            totalSpan.textContent = grandTotal + ' ₽';
        }
        if (breakdownSpan) {
            if (drinksTotal > 0) {
                breakdownSpan.textContent = `кальян ${HOOKAH_PRICE}₽ + напитки ${drinksTotal}₽`;
            } else {
                breakdownSpan.textContent = `(включая кальян ${HOOKAH_PRICE}₽)`;
            }
        }
        return grandTotal;
    }
    
    // Привязываем обработчики к кнопкам
    document.querySelectorAll('.drink-qty-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const card = btn.closest('.drink-card');
            const drinkId = card.dataset.id;
            const action = btn.dataset.action;
            if (action === 'plus') {
                changeQuantity(drinkId, 1);
            } else if (action === 'minus') {
                changeQuantity(drinkId, -1);
            }
        });
    });
    
    updateTotal();

    // --- Отправка заказа ---
    async function submitOrder() {
        const errorDiv = document.getElementById('errorMessage');
        errorDiv.style.display = 'none';
        
        const btn = document.querySelector('.booking-btn');
        btn.disabled = true;
        btn.textContent = '⏳ Отправка...';

        const user = tg.initDataUnsafe?.user || {};
        
        const selectedDrinks = [];
        for (const [id, drink] of Object.entries(drinks)) {
            if (drink.qty > 0) {
                selectedDrinks.push({
                    name: drink.name,
                    price: drink.price,
                    quantity: drink.qty
                });
            }
        }

        const bookingData = {
            user_id: user.id || 0,
            user_name: `${user.first_name || ''} ${user.last_name || ''}`.trim() || "Гость",
            time: `${selectedHour}:${selectedMinute}`,
            zone: document.getElementById("zone").value,
            hookah: {
                flavor: document.getElementById("flavor").value,
                strength: parseInt(selectedStrength),
                price: HOOKAH_PRICE
            },
            drinks: selectedDrinks,
            drinksTotal: getDrinksTotal(),
            totalPrice: HOOKAH_PRICE + getDrinksTotal()
        };

        console.log("Отправляю заказ:", bookingData);

        try {
            const response = await fetch(BOT_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bookingData)
            });
            
            const result = await response.json();
            console.log("Ответ сервера:", result);
            
            if (result.status === 'success') {
                tg.showPopup({
                    title: '✅ Забронировано!',
                    message: `Ваш заказ #${result.booking_id} принят!\nСумма: ${bookingData.totalPrice}₽`,
                    buttons: [{type: 'ok'}]
                });
            } else {
                throw new Error(result.message || 'Неизвестная ошибка');
            }
        } catch (error) {
            console.error("Ошибка:", error);
            errorDiv.textContent = `❌ Ошибка: ${error.message}`;
            errorDiv.style.display = 'block';
            tg.showPopup({
                title: '❌ Ошибка',
                message: `Не удалось отправить заказ: ${error.message}`,
                buttons: [{type: 'ok'}]
            });
        } finally {
            btn.disabled = false;
            btn.textContent = '✨ Забронировать ✨';
        }
    }
</script>
</body>
</html>
